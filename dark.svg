            <text x="37" y="17" class="text-main" font-size="12" font-weight="500" text-anchor="middle">Docker</text>
          </g>
          <g transform="translate(162,0)">
            <rect width="84" height="26" rx="13" fill="#1E293B" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <text x="42" y="17" class="text-main" font-size="12" font-weight="500" text-anchor="middle">Postgres</text>
          </g>
        </g>
      </g>

      <g transform="translate(0, 385)">
        <line x1="0" y1="0" x2="570" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <g transform="translate(0, 16)">
          <g transform="translate(0,0)">
            <circle cx="14" cy="14" r="14" fill="#1E293B" stroke="rgba(255,255,255,0.1)"/>
