  <rect width="1180" height="2" y="0" fill="#22D3EE" opacity="0.18">
    <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite" values="0,0; 0,608; 0,0"/>
  </rect>
  
  <g opacity="0.7">
    <circle cx="120" cy="80" r="1.5" fill="#22D3EE">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1060" cy="180" r="1.5" fill="#7C3AED">
      <animate attributeName="opacity" values="0.8;0.1;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="520" r="2" fill="#10B981">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
