          </g>
          <g transform="translate(248,0)">
            <rect width="96" height="26" rx="13" fill="#1E293B" stroke="url(#animatedGradient)" stroke-width="1.2" filter="url(#glow)" opacity="0.45"/>
            <rect width="96" height="26" rx="13" fill="#1E293B" stroke="url(#animatedGradient)" stroke-width="1.2"/>
            <text x="48" y="17" class="text-main" font-size="12" font-weight="600" text-anchor="middle" fill="#22D3EE">TypeScript</text>
          </g>
          <g transform="translate(352,0)">
            <rect width="82" height="26" rx="13" fill="#1E293B" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <text x="41" y="17" class="text-main" font-size="12" font-weight="500" text-anchor="middle">Tailwind</text>
