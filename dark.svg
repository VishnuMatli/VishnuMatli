        Hi 👋 I'm <tspan fill="url(#animatedGradient)">Vishnu</tspan>
      </text>

      <g transform="translate(0, 52)">
        <text x="0" y="0" class="text-mono" font-size="18" font-weight="700" fill="#22D3EE">&amp;gt;</text>
        <g class="text-mono" font-size="18" font-weight="500" fill="#F8FAFC">
          <text x="22" y="0">
            <animate attributeName="display" values="inline;inline;none;none;none" dur="12s" repeatCount="indefinite" keyTimes="0;0.31;0.34;0.98;1" />
            Frontend Engineer
