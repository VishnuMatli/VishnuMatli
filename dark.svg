        </g>
        <g opacity="0"><animate attributeName="opacity" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
          <text x="0" y="112" class="text-muted" font-weight="500">Email:</text>
          <text x="130" y="112" class="text-main" font-weight="500">vishnu@example.com</text>
        </g>
      </g>

      <g transform="translate(0, 275)">
        <text x="0" y="0" class="text-mono" font-size="11" font-weight="700" fill="#94A3B8" letter-spacing="1">TECHNICAL CAPABILITIES</text>
        
        <g transform="translate(0, 16)">
