<svg width="1180" height="610" viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap');
      .text-main { font-family: 'Inter', -apple-system, sans-serif; fill: #F8FAFC; }
      .text-muted { font-family: 'Inter', -apple-system, sans-serif; fill: #94A3B8; }
      .text-mono { font-family: 'JetBrains Mono', monospace; }
    </style>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0B1329"/>
    </linearGradient>
    
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.55"/>
    </linearGradient>
    
    <linearGradient id="animatedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="borderShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.02)"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.3">
        <animate attributeName="stop-opacity" values="0.3;0.08;0.3" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
    </filter>

    <clipPath id="canvasClip">
      <rect width="1180" height="610" rx="16" ry="16"/>
    </clipPath>
  </defs>
  
  <rect width="1180" height="610" rx="16" ry="16" fill="url(#bgGradient)"/>
  <rect width="1180" height="610" rx="16" ry="16" fill="black" opacity="0.02" filter="url(#noise)" clip-path="url(#canvasClip)"/>
  
  <g opacity="0.6">
    <circle cx="200" cy="150" r="150" fill="#7C3AED" opacity="0.12" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" dur="20s" repeatCount="indefinite" values="0,0; 40,20; -20,40; 0,0"/>
    </circle>
    <circle cx="950" cy="450" r="180" fill="#22D3EE" opacity="0.08" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" dur="25s" repeatCount="indefinite" values="0,0; -40,30; 20,-20; 0,0"/>
    </circle>
  </g>
  
  <g transform="translate(40, 45)">
    <animateTransform attributeName="transform" type="translate" values="40,45; 40,37; 40,45" dur="6s" repeatCount="indefinite" additive="sum"/>
    <rect width="410" height="520" rx="12" fill="url(#panelGradient)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="25" y="35" class="text-mono" font-size="11" fill="#94A3B8" opacity="0.4" letter-spacing="0.5">MATRIX_STREAM::ACTIVE</text>
    <circle cx="385" cy="31" r="3.5" fill="#10B981"/>

    <g transform="translate(25, 80)" fill="url(#animatedGradient)" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold">
      <text x="0" y="20" opacity="0"><animate attributeName="opacity" to="0.95" begin="0.2s" dur="0.4s" fill="freeze"/>███╗    ███╗ █████╗ ███╗   ██╗██╗</text>
      <text x="0" y="38" opacity="0"><animate attributeName="opacity" to="0.95" begin="0.4s" dur="0.4s" fill="freeze"/>████╗ ████║██╔══██╗████╗  ██║██║</text>
      <text x="0" y="56" opacity="0"><animate attributeName="opacity" to="0.95" begin="0.6s" dur="0.4s" fill="freeze"/>██╔████╔██║███████║██╔██╗ ██║██║</text>
      <text x="0" y="74" opacity="0"><animate attributeName="opacity" to="0.95" begin="0.8s" dur="0.4s" fill="freeze"/>██║╚██╔╝██║██╔══██║██║╚██╗██║██║</text>
      <text x="0" y="92" opacity="0"><animate attributeName="opacity" to="0.95" begin="1.0s" dur="0.4s" fill="freeze"/>██║ ╚═╝ ██║██║  ██║██║ ╚████║██║</text>
      <text x="0" y="110" opacity="0"><animate attributeName="opacity" to="0.95" begin="1.2s" dur="0.4s" fill="freeze"/>╚═╝     ╚═╝╚═╝  ╚═╝╚═╝  ╚═══╝╚═╝</text>
      
      <g font-size="11" fill="#94A3B8" font-weight="normal" opacity="0.6" transform="translate(0, 160)">
        <text x="0" y="20" opacity="0"><animate attributeName="opacity" to="0.7" begin="1.5s" dur="0.5s" fill="freeze"/>[⚡] CORE SYSTEM INGESTION COMPLETE</text>
        <text x="0" y="42" opacity="0"><animate attributeName="opacity" to="0.7" begin="1.8s" dur="0.5s" fill="freeze"/>[✓] NETWORK NETWORK.. SECURE (127.0.0.1)</text>
        <text x="0" y="64" opacity="0"><animate attributeName="opacity" to="0.7" begin="2.1s" dur="0.5s" fill="freeze"/>[✓] COGNITIVE AGENT MODULE ONLINE</text>
      </g>

      <g opacity="0" transform="translate(10, 290)"><animate attributeName="opacity" to="0.35" begin="2.5s" dur="0.8s" fill="freeze"/>
        <path d="M10,60 L50,100 L160,100 L200,60 L320,60" fill="none" stroke="url(#animatedGradient)" stroke-width="1.5" stroke-dasharray="4,4"/>
        <circle cx="50" cy="100" r="3.5" fill="#22D3EE"/>
        <circle cx="200" cy="60" r="3.5" fill="#7C3AED"/>
        <text x="10" y="50" class="text-mono" font-size="9" fill="#22D3EE" font-weight="normal">SECURE_NODE_X79</text>
      </g>
    </g>

    <line x1="0" y1="0" x2="410" y2="0" stroke="rgba(34, 211, 238, 0.12)" stroke-width="2">
      <animate attributeName="y" values="10;510;10" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <g transform="translate(490, 45)">
    <rect width="650" height="520" rx="12" fill="url(#panelGradient)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    
    <circle cx="30" cy="32" r="6" fill="#EF4444" opacity="0.85"/>
    <circle cx="50" cy="32" r="6" fill="#F59E0B" opacity="0.85"/>
    <circle cx="70" cy="32" r="6" fill="#10B981" opacity="0.85"/>
    <text x="110" y="36" class="text-mono" font-size="11" fill="#94A3B8" opacity="0.4">bash — vishnu@mainframe:~</text>

    <g transform="translate(40, 95)">
