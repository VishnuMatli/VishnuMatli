<svg width="1180" height="610" viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap');
      .text-main { font-family: 'Inter', -apple-system, sans-serif; fill: #0F172A; }
      .text-muted { font-family: 'Inter', -apple-system, sans-serif; fill: #475569; }
      .text-mono { font-family: 'JetBrains Mono', monospace; }
    </style>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#F1F5F9" stop-opacity="0.7"/>
    </linearGradient>
    
    <linearGradient id="animatedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB">
        <animate attributeName="stop-color" values="#2563EB;#06B6D4;#10B981;#2563EB" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#06B6D4">
        <animate attributeName="stop-color" values="#06B6D4;#10B981;#2563EB;#06B6D4" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#2563EB;#06B6D4;#10B981" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="borderShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(15,23,42,0.02)"/>
      <stop offset="50%" stop-color="#2563EB" stop-opacity="0.15">
        <animate attributeName="stop-opacity" values="0.15;0.05;0.15" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="rgba(15,23,42,0.02)"/>
    </linearGradient>

    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.04"/>
    </filter>
  </defs>
  
  <rect width="1180" height="610" rx="16" ry="16" fill="url(#bgGradient)"/>
  
  <g transform="translate(40, 45)">
